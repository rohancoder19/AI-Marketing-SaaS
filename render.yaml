services:
  # 1. Backend FastAPI Web Service
  - type: web
    name: ai-marketing-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"

  # 2. Frontend React (Vite) Static Site
  - type: web
    name: ai-marketing-frontend
    env: static
    rootDir: frontend
    buildCommand: npm run build
    publishDir: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: ai-marketing-backend
          property: url
      - key: VITE_GEMINI_API_KEY
        sync: false
